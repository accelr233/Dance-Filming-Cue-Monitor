<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101418">
  <title>Dance Filming Cue Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101418;
      --panel: #171d22;
      --panel-2: #20272d;
      --text: #f5f7f8;
      --muted: #9ba8af;
      --line: #2f3940;
      --accent: #ffcc4d;
      --accent-2: #42d3a5;
      --danger: #ff6b6b;
      --blue: #62b4ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, .35);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        radial-gradient(circle at 14% 0%, rgba(255, 204, 77, .12), transparent 30rem),
        linear-gradient(145deg, #101418 0%, #152026 45%, #101418 100%);
      color: var(--text);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 980px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .icon-row {
      display: flex;
      gap: 8px;
      flex: none;
    }

    .icon-btn,
    .small-btn {
      min-width: 44px;
      height: 44px;
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--line);
      display: inline-grid;
      place-items: center;
    }

    .small-btn {
      padding: 0 12px;
      width: auto;
      min-width: 52px;
      font-size: 13px;
    }

    .hero {
      min-height: 44svh;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      background:
        linear-gradient(150deg, rgba(255, 204, 77, .16), transparent 42%),
        linear-gradient(0deg, rgba(0, 0, 0, .16), rgba(0, 0, 0, .16)),
        var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      overflow: hidden;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .08);
      white-space: nowrap;
    }

    .sync-good {
      color: var(--accent-2);
    }

    .cue-stage {
      align-self: center;
      display: grid;
      gap: 8px;
      text-align: center;
    }

    /* Now-playing block inside hero */
    .now-playing {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(66, 211, 165, .12);
      border: 1px solid rgba(66, 211, 165, .3);
      display: grid;
      gap: 4px;
      text-align: left;
    }
    .now-playing-header {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .now-playing-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent-2);
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(66, 211, 165, .7);
      animation: nowDotPulse 1.8s ease-in-out infinite;
    }
    .now-playing-label {
      color: var(--accent-2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 600;
    }
    .now-playing-elapsed {
      margin-left: auto;
      color: rgba(66, 211, 165, .6);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    @keyframes nowDotPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.7); }
    }
    .now-playing-text {
      color: var(--accent-2);
      font-size: clamp(26px, 8vw, 48px);
      font-weight: 800;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .now-playing-shot {
      color: rgba(66, 211, 165, .65);
      font-size: clamp(13px, 3vw, 17px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .now-playing.idle {
      background: rgba(255, 255, 255, .045);
      border-color: rgba(255, 255, 255, .08);
    }
    .now-playing.idle .now-playing-dot {
      background: var(--muted);
      box-shadow: none;
      animation: none;
    }
    .now-playing.idle .now-playing-label,
    .now-playing.idle .now-playing-text { color: var(--muted); }
    .now-playing.idle .now-playing-elapsed { display: none; }

    .label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
    }

    .countdown {
      font-variant-numeric: tabular-nums;
      font-size: clamp(48px, 19vw, 142px);
      line-height: .92;
      color: var(--accent);
      text-shadow: 0 10px 32px rgba(255, 204, 77, .18);
    }

    .name {
      margin: 0;
      font-size: clamp(34px, 11vw, 86px);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .shot {
      min-height: 24px;
      color: var(--muted);
      font-size: clamp(16px, 4.8vw, 28px);
      overflow-wrap: anywhere;
    }

    .now-next {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini-panel,
    .fingerprint-panel {
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
      padding: 10px;
      background: rgba(255, 255, 255, .045);
    }

    .mini-panel b,
    .mini-panel span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-panel span {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .controls,
    .wide-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary,
    .secondary {
      height: 58px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 16px;
    }

    .primary {
      color: #101418;
      background: var(--accent);
    }

    .secondary {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .secondary.blue {
      border-color: rgba(98, 180, 255, .55);
      color: #d9ecff;
    }

    .secondary.active {
      border-color: rgba(66, 211, 165, .72);
      color: var(--accent-2);
    }

    .nudge {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .section {
      border-top: 1px solid rgba(255, 255, 255, .08);
      padding-top: 14px;
      display: grid;
      gap: 10px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 15px;
    }

    .cue-list {
      display: grid;
      gap: 8px;
      overflow-y: auto;
      overscroll-behavior: contain;
      position: relative;
    }
    body:not(.role-client) .cue-list {
      max-height: 50vh;
      padding-right: 4px;
    }
    body.role-client .cue-list {
      max-height: 268px;
      padding-right: 4px;
    }

    .cue-item {
      display: grid;
      grid-template-columns: 70px 1fr 44px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      transition: all 0.2s ease;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .cue-item.active {
      border-color: rgba(66, 211, 165, .65);
      background: rgba(66, 211, 165, .08);
    }

    .cue-item.next {
      border-color: rgba(255, 204, 77, .65);
    }

    .cue-time {
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-weight: 800;
    }

    .cue-copy {
      min-width: 0;
    }

    .cue-copy strong,
    .cue-copy small {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cue-copy small {
      color: var(--muted);
      margin-top: 2px;
    }

    .remove {
      color: var(--danger);
      background: transparent;
      border: 1px solid rgba(255, 107, 107, .4);
      border-radius: 8px;
      height: 38px;
      font-size: 20px;
    }

    .editor {
      display: grid;
      gap: 8px;
    }

    .fields {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 12px;
      outline: none;
    }

    input[type="file"] {
      padding: 10px;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.45;
    }

    .hint,
    .fingerprint-status {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .meter {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .08);
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--accent-2));
      transition: width .18s ease;
    }

    @media (min-width: 760px) {
      .app {
        grid-template-columns: minmax(420px, 1.1fr) minmax(340px, .9fr);
        align-content: start;
      }

      .topbar {
        grid-column: 1 / -1;
      }

      .hero {
        position: sticky;
        top: 16px;
      }
    }

    .lobby {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    .lobby input {
      width: 200px;
      font-size: 24px;
      text-align: center;
      letter-spacing: 4px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      outline: none;
    }
    .role-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 200px;
    }
    .role-buttons button {
      height: 48px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 15px;
    }
    .role-client .host-only {
      display: none !important;
    }
    .cue-item.done {
      opacity: 0.4;
      border-color: rgba(66, 211, 165, .4);
    }
    .cue-item.done .cue-time {
      color: var(--accent-2);
      text-decoration: line-through;
    }
    .cue-item.done .cue-copy strong {
      text-decoration: line-through;
    }

    /* Custom audio player */
    .audio-player { display: grid; gap: 10px; }
    .player-controls { display: flex; align-items: center; gap: 10px; }
    .play-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); color: #101418;
      font-size: 22px; flex-shrink: 0;
      display: grid; place-items: center; border: none; cursor: pointer;
      transition: transform .12s;
    }
    .play-btn:active { transform: scale(.92); }
    .player-time {
      font-variant-numeric: tabular-nums; font-size: 13px;
      color: var(--muted); flex-shrink: 0; min-width: 100px;
    }
    .progress-wrap {
      position: relative; height: 36px; cursor: pointer;
      display: flex; align-items: center;
    }
    .progress-track {
      position: absolute; top: 50%; left: 0; right: 0; height: 6px;
      transform: translateY(-50%);
      background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px; transition: width .08s linear; min-width: 0;
    }
    .cue-marker {
      position: absolute; top: 50%;
      transform: translateX(-50%) translateY(-50%);
      width: 3px; height: 16px;
      background: rgba(66,211,165,.85); border-radius: 2px; pointer-events: none;
    }
    .cue-marker-label {
      position: absolute; bottom: calc(50% + 11px);
      transform: translateX(-50%); font-size: 9px;
      color: var(--accent-2); white-space: nowrap; pointer-events: none; opacity: .75;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }

    /* Client count badge */
    .client-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted);
      padding: 7px 10px; border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08); white-space: nowrap;
    }
    .client-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2);
    }

    /* Countdown urgent flash */
    @keyframes urgentPulse {
      0%,100% { opacity:1; color: var(--danger); }
      50%      { opacity:.55; }
    }
    .countdown.urgent { animation: urgentPulse .5s ease-in-out infinite; }

    /* Done badge on host cue */
    .done-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .done-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 999px;
      background: rgba(66,211,165,.18); color: var(--accent-2);
      border: 1px solid rgba(66,211,165,.3);
    }


    /* Client count badge */
    .client-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted);
      padding: 7px 10px; border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08); white-space: nowrap;
    }
    .client-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2);
    }

    /* Countdown urgent flash */
    @keyframes urgentPulse {
      0%,100% { opacity:1; color: var(--danger); text-shadow: 0 10px 32px rgba(255,107,107,.35); }
      50%      { opacity:.5; }
    }
    .countdown.urgent { animation: urgentPulse .45s ease-in-out infinite; }

    /* Done badge on host cue list */
    .done-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .done-badge {
      font-size: 10px; padding: 1px 7px; border-radius: 999px;
      background: rgba(66,211,165,.18); color: var(--accent-2);
      border: 1px solid rgba(66,211,165,.3);
    }

    /* Online users list */
    .online-list {
      display: flex; flex-direction: column; gap: 6px;
    }
    .online-user {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      font-size: 13px;
    }
    .online-user-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .online-user-dot.host { background: var(--accent); box-shadow: 0 0 5px rgba(255,204,77,.5); }
    .online-user-dot.client { background: var(--accent-2); box-shadow: 0 0 5px rgba(66,211,165,.5); }
    .online-user-name { font-weight: 600; flex: 1; }
    .online-user-role { color: var(--muted); font-size: 11px; }

    /* Video player */
    #mediaPlayer {
      width: 100%; border-radius: 8px; background: #000;
      display: none; max-height: 240px; object-fit: contain;
    }
    #mediaPlayer.is-audio { max-height: 44px; background: transparent; }

    /* Lobby name input */
    .lobby-fields { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .lobby-fields input { width: 200px; }
  </style>
</head>
<body>
  <div id="lobby" class="lobby">
    <h1>舞蹈跟拍监视器</h1>
    <div class="lobby-fields">
      <input type="text" id="userName" placeholder="你的名字" maxlength="12" autocomplete="off">
      <input type="text" id="roomCode" placeholder="房间号" maxlength="4" autocomplete="off">
    </div>
    <div class="role-buttons">
      <button id="joinHostBtn" class="primary">我是控制端 (Host)</button>
      <button id="joinClientBtn" class="secondary">我是摄影师 (Client)</button>
    </div>
  </div>

  <main class="app" id="app" style="display: none;">
    <header class="topbar">
      <div class="brand">
        <h1>Dance Filming Cue Monitor</h1>
        <p>手机屏幕提前提示下一个拍摄对象</p>
      </div>
      <div class="icon-row">
        <span class="client-badge" id="clientBadge" title="已连接设备数"><span class="client-dot"></span><span id="clientCount">0</span> 在线</span>
        <button class="icon-btn" id="fullscreenBtn" type="button" title="全屏">FS</button>
        <button class="icon-btn" id="wakeBtn" type="button" title="保持亮屏">ON</button>
      </div>
    </header>

    <section class="hero" aria-live="polite">
      <div class="status">
        <span class="pill" id="clock">00:00.0</span>
        <span class="pill" id="syncState">未同步</span>
      </div>

      <div class="cue-stage">
        <!-- Now playing block -->
        <div class="now-playing idle" id="nowPlaying">
          <div class="now-playing-header">
            <span class="now-playing-dot"></span>
            <span class="now-playing-label">正在拍</span>
            <span class="now-playing-elapsed" id="nowPlayingElapsed"></span>
          </div>
          <div class="now-playing-text" id="nowPlayingName">未开始</div>
          <div class="now-playing-shot" id="nowPlayingShot"></div>
        </div>

        <div class="label">下一个</div>
        <div class="countdown" id="countdown">--.-</div>
        <h2 class="name" id="nextName">等待同步</h2>
        <div class="shot" id="nextShot">上传音乐后开始播放</div>
      </div>

      <div class="now-next">
        <div class="mini-panel">
          <span>再下一个</span>
          <b id="afterCue">-</b>
        </div>
        <div class="mini-panel">
          <span>已用时</span>
          <b id="elapsedClock">未开始</b>
        </div>
      </div>
    </section>

    <div class="side">
      <section class="section host-only">
        <div class="section-title">
          <h2>音乐控制</h2>
        </div>
        <div style="padding: 10px; background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; display: grid; gap: 10px;">
          <input id="audioFile" type="file" accept=".mp3,.m4a,.aac,.wav,.flac,.mp4,.mov,.m4v,audio/*,video/*" aria-label="上传音频/视频" style="border: none; background: transparent; padding: 0;">
          <video id="audioPlayer" id="mediaPlayer" controls loop style="width:100%; border-radius:6px; margin-top:4px; display:none;"></video>
        </div>
        <p class="hint">支持音频（MP3/WAV等）和视频（MP4）。播放、暂停、拖动进度条实时同步到所有摄影师。</p>
      </section>

      <section class="section">
        <div class="section-title">
          <h2>提示列表</h2>
          <div class="icon-row">
            <button class="small-btn host-only" id="syncCuesBtn" type="button" title="手动同步">↑同步</button>
            <button class="small-btn host-only" id="sortBtn" type="button">排序</button>
          </div>
        </div>
        <!-- Global time offset nudge (host only) -->
        <div class="host-only nudge" id="timeOffsetRow" style="margin-bottom:2px;">
          <button class="small-btn" data-offset="-2" type="button">-2s</button>
          <button class="small-btn" data-offset="-1" type="button">-1s</button>
          <button class="small-btn" data-offset="1" type="button">+1s</button>
          <button class="small-btn" data-offset="2" type="button">+2s</button>
        </div>
        <div class="cue-list" id="cueList"></div>
      </section>

      <!-- Online users panel (visible to all) -->
      <section class="section" id="onlineSection">
        <div class="section-title">
          <h2>在线成员</h2>
          <span class="pill" style="font-size:12px;" id="onlineCount">0 人</span>
        </div>
        <div class="online-list" id="onlineList"><p class="hint">连接后显示</p></div>
      </section>

      <section class="section host-only">
        <div class="section-title">
          <h2>添加提示</h2>
        </div>
        <form class="editor" id="cueForm">
          <div class="fields">
            <input id="cueTime" inputmode="decimal" placeholder="00:12" aria-label="提示时间">
            <input id="cueName" placeholder="要拍谁" aria-label="要拍谁">
          </div>
          <input id="cueShot" placeholder="镜头/位置，比如左侧特写" aria-label="镜头说明">
          <button class="secondary" type="submit">添加到列表</button>
        </form>
      </section>

      <section class="section host-only">
        <div class="section-title">
          <h2>批量编辑</h2>
        </div>
        <textarea id="bulkText" spellcheck="false" aria-label="批量编辑"></textarea>
        <div class="wide-actions">
          <button class="secondary" id="loadBulkBtn" type="button">应用文本</button>
          <button class="secondary" id="copyBtn" type="button">复制备份</button>
        </div>
        <p class="hint">每行格式：时间, 名字, 镜头。例：00:18, 小林, 中景跟拍</p>
      </section>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const STORAGE_KEY = "dance-filming-cues-v1";


    const defaultCues = [
      { time: 4, name: "开场全景", shot: "舞台全景，确认所有人入画" },
      { time: 12, name: "A组", shot: "左侧中景" },
      { time: 24, name: "小林", shot: "特写，第二个八拍" },
      { time: 38, name: "B组", shot: "右侧横移" },
      { time: 54, name: "全员", shot: "收尾定点，全景" }
    ];

    const state = {
      cues: loadCues(),
      startAt: null,
      pausedAt: 0,
      running: false,
      wakeLock: null,
      lastListKey: "",
      role: null,
      room: null,
      clientDone: new Set(),
      clientDones: new Map()    // cueTime -> done count from clients
    };

    let socket = null;
    let serverTimeOffset = 0;

    function getServerTime() {
      return Date.now() + serverTimeOffset;
    }

    function syncTimeWithServer() {
      if (!socket) return;
      const start = Date.now();
      socket.emit('ping', start, (serverTime) => {
        const latency = (Date.now() - start) / 2;
        serverTimeOffset = serverTime - latency - Date.now();
      });
    }

    function broadcastState() {
      if (!socket || state.role !== 'host') return;
      const serverNow = getServerTime();
      let serverStartAt = 0;
      if (state.running) {
        const currentSeconds = (performance.now() - state.startAt) / 1000;
        serverStartAt = serverNow - currentSeconds * 1000;
      }
      socket.emit('updateState', {
        running: state.running,
        pausedAt: state.pausedAt,
        serverStartAt: serverStartAt
      });
    }

    const $ = (selector) => document.querySelector(selector);
    const cueList = $("#cueList");
    const bulkText = $("#bulkText");
    
    

    function loadCues() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultCues;
      } catch {
        return defaultCues;
      }
    }

    function saveCues(broadcast = true) {
      state.cues.sort((a, b) => a.time - b.time);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.cues));
      if (bulkText) {
        bulkText.value = state.cues.map(cue => `${formatTime(cue.time)}, ${cue.name}, ${cue.shot}`).join("\n");
      }
      if (broadcast && socket && state.role === 'host') {
        socket.emit('updateCues', state.cues);
      }
    }

    function parseTime(value) {
      const raw = value.trim();
      if (!raw) return NaN;
      if (raw.includes(":")) {
        const parts = raw.split(":").map(Number);
        if (parts.some(Number.isNaN)) return NaN;
        return parts.reduce((total, part) => total * 60 + part, 0);
      }
      return Number(raw);
    }

    function formatTime(seconds) {
      const safe = Math.max(0, seconds);
      const mins = Math.floor(safe / 60);
      const secs = Math.floor(safe % 60);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function formatClock(seconds) {
      const safe = Math.max(0, seconds);
      const mins = Math.floor(safe / 60);
      const secs = Math.floor(safe % 60);
      const tenths = Math.floor((safe % 1) * 10);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}.${tenths}`;
    }

    function currentTime() {
      if (!state.running) return state.pausedAt;
      return (performance.now() - state.startAt) / 1000;
    }

    function syncTo(seconds, label = "播放中", broadcast = true) {
      state.pausedAt = Math.max(0, seconds);
      state.startAt = performance.now() - state.pausedAt * 1000;
      state.running = true;
      $("#syncState").textContent = label;
      $("#syncState").classList.add("sync-good");
      state.lastListKey = "";
      if (broadcast) broadcastState();
    }

    function getCueWindow(time) {
      const sorted = [...state.cues].sort((a, b) => a.time - b.time);
      const nextIndex = sorted.findIndex(cue => cue.time > time);
      const now = [...sorted].reverse().find(cue => cue.time <= time);
      const next = nextIndex >= 0 ? sorted[nextIndex] : null;
      const after = nextIndex >= 0 ? sorted[nextIndex + 1] : null;
      return { sorted, now, next, after };
    }

    function renderHero() {
      const time = currentTime();
      const { now, next, after } = getCueWindow(time);
      $("#clock").textContent = formatClock(time);
      $("#afterCue").textContent = after ? `${formatTime(after.time)} ${after.name}` : "-";
      $("#elapsedClock").textContent = state.running ? formatClock(time) : "未开始";

      // Now-playing block
      const nowPlaying = $("#nowPlaying");
      if (now && state.running) {
        nowPlaying.classList.remove("idle");
        $("#nowPlayingName").textContent = now.name;
        $("#nowPlayingShot").textContent = now.shot || "";
        const inCueSecs = Math.floor(time - now.time);
        $("#nowPlayingElapsed").textContent = `已拍 ${inCueSecs}s`;
      } else {
        nowPlaying.classList.add("idle");
        $("#nowPlayingName").textContent = state.running ? "片头" : "未开始";
        $("#nowPlayingShot").textContent = "";
        $("#nowPlayingElapsed").textContent = "";
      }

      if (next) {
        const left = next.time - time;
        $("#countdown").textContent = left < 10 ? left.toFixed(1) : Math.ceil(left).toString();
        if (left <= 5 && left > 0 && state.running) {
          $("#countdown").classList.add("urgent");
        } else {
          $("#countdown").classList.remove("urgent");
        }
        $("#nextName").textContent = next.name;
        $("#nextShot").textContent = next.shot || formatTime(next.time);
      } else {
        $("#countdown").textContent = "END";
        $("#countdown").classList.remove("urgent");
        $("#nextName").textContent = "提示结束";
        $("#nextShot").textContent = "可以停止拍摄或等待下一首";
      }
    }

    function renderList() {
      const time = currentTime();
      const { now, next } = getCueWindow(time);
      const listKey = `${now?.time ?? "none"}|${next?.time ?? "none"}|${state.cues.length}`;
      if (state.lastListKey === listKey && cueList.children.length === state.cues.length) return;
      state.lastListKey = listKey;
      cueList.innerHTML = "";

      let activeItemNode = null;

      state.cues.forEach((cue, index) => {
        const item = document.createElement("div");
        item.className = "cue-item";
        if (now === cue) item.classList.add("active");
        if (next === cue) item.classList.add("next");
        if (state.clientDone.has(cue.time)) item.classList.add("done");
        
        const doneCount = state.clientDones.get(cue.time) || 0;
        item.innerHTML = `
          <div class="cue-time">${formatTime(cue.time)}</div>
          <div class="cue-copy">
            <strong>${escapeHtml(cue.name)}</strong>
            <small>${escapeHtml(cue.shot || "")}</small>
            ${state.role === 'host' && doneCount > 0 ? `<div class="done-badges">${'<span class="done-badge">✓</span>'.repeat(doneCount)}</div>` : ''}
          </div>
          <button class="remove host-only" type="button" aria-label="删除">x</button>
        `;
        
        item.querySelector(".remove").addEventListener("click", (e) => {
          e.stopPropagation();
          state.cues.splice(index, 1);
          state.lastListKey = "";
          saveCues();
          renderList();
        });
        
        if (state.role === 'client') {
          item.addEventListener("click", () => {
            const wasDone = state.clientDone.has(cue.time);
            if (wasDone) {
              state.clientDone.delete(cue.time);
            } else {
              state.clientDone.add(cue.time);
            }
            if (socket) socket.emit('clientDone', { cueTime: cue.time, done: !wasDone });
            state.lastListKey = "";
            renderList();
          });
          item.style.cursor = "pointer";
        }

        if (state.role === 'host') {
          // Single tap = seek player to cue time; double-tap = edit
          let tapTimer = null;
          item.addEventListener("click", () => {
            if (tapTimer) return;
            tapTimer = setTimeout(() => {
              tapTimer = null;
              const player = $("#audioPlayer");
              if (player && player.src) {
                player.currentTime = cue.time;
                // If paused, keep paused but update sync state
                if (player.paused) {
                  state.pausedAt = cue.time;
                  broadcastState();
                  renderHero();
                }
              }
            }, 250);
          });
          item.addEventListener("dblclick", () => {
            if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
            const newTimeStr = prompt("修改时间 (格式: 秒数 或 分:秒)", formatTime(cue.time));
            if (newTimeStr === null) return;
            const newTime = parseTime(newTimeStr);
            if (Number.isNaN(newTime)) return alert("时间格式不正确");
            const newName = prompt("修改要拍谁 (名称)", cue.name);
            if (newName === null) return;
            const newShot = prompt("修改镜头说明", cue.shot || "");
            if (newShot === null) return;
            cue.time = newTime;
            cue.name = newName.trim();
            cue.shot = newShot.trim();
            saveCues();
            state.lastListKey = "";
            renderList();
          });
          item.style.cursor = "pointer";
          item.title = "单击跳转 / 双击修改";
        }
        
        cueList.appendChild(item);

        if ((now === cue || next === cue) && !activeItemNode) {
          activeItemNode = item;
        }
      });

      // Auto-scroll to active cue for both host and client
      if (activeItemNode && state.running) {
        setTimeout(() => {
          cueList.scrollTo({ top: activeItemNode.offsetTop - 10, behavior: 'smooth' });
        }, 10);
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function tick() {
      renderHero();
      renderList();
      requestAnimationFrame(tick);
    }

    const audioPlayer = $("#audioPlayer");

    $("#audioFile").addEventListener("change", event => {
      const file = event.target.files?.[0];
      if (!file) return;
      const isVideo = file.type.startsWith('video/');
      audioPlayer.style.display = 'block';
      if (isVideo) {
        audioPlayer.style.maxHeight = '240px';
        audioPlayer.style.background = '#000';
        audioPlayer.style.objectFit = 'contain';
      } else {
        audioPlayer.style.maxHeight = '44px';
        audioPlayer.style.background = 'transparent';
        audioPlayer.style.objectFit = '';
      }
      audioPlayer.src = URL.createObjectURL(file);
    });

    audioPlayer.addEventListener("play", () => {
      syncTo(audioPlayer.currentTime, "播放中", true);
    });

    audioPlayer.addEventListener("pause", () => {
      // loop triggers a very brief pause-then-play; ignore if it immediately replays
      setTimeout(() => {
        if (audioPlayer.paused) {
          state.running = false;
          state.pausedAt = audioPlayer.currentTime;
          $("#syncState").textContent = "已暂停";
          broadcastState();
        }
      }, 80);
    });

    audioPlayer.addEventListener("seeked", () => {
      if (!audioPlayer.paused) {
        syncTo(audioPlayer.currentTime, "播放中", true);
      } else {
        state.pausedAt = audioPlayer.currentTime;
        broadcastState();
        renderHero();
      }
    });

    // Keep internal clock locked to real audio position while playing
    audioPlayer.addEventListener("timeupdate", () => {
      if (state.role === "host" && state.running) {
        state.startAt = performance.now() - audioPlayer.currentTime * 1000;
      }
    });

    $("#cueForm").addEventListener("submit", event => {
      event.preventDefault();
      const time = parseTime($("#cueTime").value);
      const name = $("#cueName").value.trim();
      const shot = $("#cueShot").value.trim();
      if (!Number.isFinite(time) || !name) return;
      state.cues.push({ time, name, shot });
      $("#cueTime").value = "";
      $("#cueName").value = "";
      $("#cueShot").value = "";
      saveCues();
      state.lastListKey = "";
      renderList();
    });

    $("#syncCuesBtn").addEventListener("click", () => {
      if (socket && state.role === 'host') {
        socket.emit('updateCues', state.cues);
        const btn = $("#syncCuesBtn");
        btn.textContent = "✓ 已同步";
        setTimeout(() => btn.textContent = "↑同步", 1500);
      }
    });

    $("#sortBtn").addEventListener("click", () => {
      saveCues();
      state.lastListKey = "";
      renderList();
    });

    // Global time offset: shift all cues by N seconds
    document.querySelectorAll("[data-offset]").forEach(btn => {
      btn.addEventListener("click", () => {
        const delta = Number(btn.dataset.offset);
        state.cues = state.cues.map(cue => ({
          ...cue,
          time: Math.max(0, cue.time + delta)
        }));
        saveCues();
        state.lastListKey = "";
        renderList();
        // Flash button feedback
        const orig = btn.textContent;
        btn.textContent = "✓";
        setTimeout(() => btn.textContent = orig, 800);
      });
    });


    $("#loadBulkBtn").addEventListener("click", () => {
      const parsed = bulkText.value.split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const [timeText, name = "", ...shotParts] = line.split(",").map(part => part.trim());
          return { time: parseTime(timeText), name, shot: shotParts.join(", ") };
        })
        .filter(cue => Number.isFinite(cue.time) && cue.name);
      if (!parsed.length) return;
      state.cues = parsed;
      saveCues();
      state.lastListKey = "";
      renderList();
    });

    $("#copyBtn").addEventListener("click", async () => {
      saveCues();
      await navigator.clipboard.writeText(bulkText.value);
      $("#copyBtn").textContent = "已复制";
      setTimeout(() => $("#copyBtn").textContent = "复制备份", 1200);
    });

    $("#fullscreenBtn").addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    });

    $("#wakeBtn").addEventListener("click", async () => {
      try {
        if (state.wakeLock) {
          await state.wakeLock.release();
          state.wakeLock = null;
          $("#wakeBtn").textContent = "ON";
          return;
        }
        state.wakeLock = await navigator.wakeLock?.request("screen");
        $("#wakeBtn").textContent = "LOCK";
      } catch {
        $("#wakeBtn").textContent = "!";
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && state.wakeLock) {
        state.wakeLock = await navigator.wakeLock?.request("screen");
      }
    });

    $("#joinHostBtn").addEventListener("click", () => joinRoom('host'));
    $("#joinClientBtn").addEventListener("click", () => joinRoom('client'));

    function joinRoom(role) {
      const room = $("#roomCode").value.trim() || "0000";
      const name = $("#userName").value.trim() || (role === 'host' ? 'Host' : '摄影师');
      state.role = role;
      state.room = room;
      state.name = name;
      
      if (role === 'client') {
        document.body.classList.add('role-client');
      }
      
      socket = io({ transports: ['websocket'] });
      
      socket.on('connect', () => {
        syncTimeWithServer();
        setInterval(syncTimeWithServer, 30000);
        socket.emit('joinRoom', { room, role, name });
        // Host: push the local cue list to server right after joining
        if (role === 'host') {
          setTimeout(() => socket.emit('updateCues', state.cues), 200);
        }
      });
      
      socket.on('syncCues', (cues) => {
        state.cues = cues;
        saveCues(false);
        state.lastListKey = "";
        renderList();
      });
      
      socket.on('syncState', (remote) => {
        state.running = remote.running;
        state.pausedAt = remote.pausedAt;
        if (remote.running) {
          const elapsedMs = getServerTime() - remote.serverStartAt;
          state.startAt = performance.now() - elapsedMs;
        }
        $("#syncState").textContent = remote.running ? "已同步" : "已暂停";
        $("#syncState").classList.add("sync-good");
      });

      // Client count updates
      socket.on('clientCount', (count) => {
        $("#clientCount").textContent = count;
      });

      // Host: a new client joined, re-broadcast our state so they sync
      socket.on('requestResync', () => {
        if (state.role === 'host') {
          setTimeout(() => {
            socket.emit('updateCues', state.cues);
            broadcastState();
          }, 100);
        }
      });

      // Receive client done markers (host shows badge)
      socket.on('clientDone', ({ cueTime, done }) => {
        const cur = state.clientDones.get(cueTime) || 0;
        state.clientDones.set(cueTime, done ? cur + 1 : Math.max(0, cur - 1));
        state.lastListKey = "";
      });

      // Online users list
      socket.on('userList', (users) => {
        const list = $("#onlineList");
        $("#onlineCount").textContent = users.length + ' 人';
        list.innerHTML = '';
        users.forEach(u => {
          const div = document.createElement('div');
          div.className = 'online-user';
          div.innerHTML = `
            <span class="online-user-dot ${u.role}"></span>
            <span class="online-user-name">${escapeHtml(u.name)}</span>
            <span class="online-user-role">${u.role === 'host' ? '控制端' : '摄影师'}</span>
          `;
          list.appendChild(div);
        });
      });
      
      $("#lobby").style.display = "none";
      $("#app").style.display = "";
      
      saveCues(false);
      renderHero();
      renderList();
      tick();
    }
    // Keep Render free-tier alive (ping every 5 min)
    setInterval(() => fetch('/ping').catch(() => {}), 5 * 60 * 1000);
  </script>
</body>
</html>
